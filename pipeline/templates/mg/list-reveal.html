<!-- Recipe: staggered list reveal with glass panel -->
<template id="mg-list-reveal-template">
  <div
    data-composition-id="{{compositionId}}"
    data-start="0"
    data-width="{{width}}"
    data-height="{{height}}"
    data-duration="{{duration}}"
  >
    <div class="mg-stage">
      <div class="mg-grid-floor"></div>
      <div class="mg-panel">
        <div class="mg-content">
          <div class="list-title accent-text" id="list-title">{{headline}}</div>
          <div class="list-items" id="list-items">
            {{listItemsHtml}}
          </div>
        </div>
      </div>
      <div class="mg-vignette"></div>
      <div class="mg-grain"></div>
    </div>

    <style>
      {{sharedStyles}}
      [data-composition-id="{{compositionId}}"] {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      [data-composition-id="{{compositionId}}"] .list-title {
        font-size: 32px;
        margin-bottom: 20px;
        opacity: 0;
      }
      [data-composition-id="{{compositionId}}"] .list-item {
        font-family: var(--mg-font);
        font-weight: 800;
        font-size: 36px;
        color: #ffffff;
        text-align: center;
        margin: 10px 0;
        opacity: 0;
        transform: translateX(-28px);
        text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      }
      [data-composition-id="{{compositionId}}"] .list-item::before {
        content: "✓ ";
        color: var(--mg-accent);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "{{compositionId}}";
        const dur = {{duration}};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        tl.fromTo(root + ' .list-title',
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' },
          0.15
        );

        const items = document.querySelectorAll(root + ' .list-item');
        items.forEach(function (el, i) {
          tl.fromTo(el,
            { opacity: 0, x: -28 },
            { opacity: 1, x: 0, duration: 0.4, ease: 'back.out(1.7)' },
            0.4 + i * 0.22
          );
        });

        tl.to(root + ' .mg-grid-floor',
          { backgroundPositionX: '-=30', duration: dur - 0.6, ease: 'none' },
          0.3
        );

        tl.to(root + ' .list-title', { opacity: 0, duration: 0.25 }, dur - 0.45);
        tl.to(root + ' .list-item', { opacity: 0, x: 12, duration: 0.25, stagger: 0.05 }, dur - 0.4);
        tl.set({}, {}, dur);

        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
