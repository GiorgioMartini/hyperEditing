<!-- counter-up: animated number count with label -->
<template id="mg-counter-up-template">
  <div data-composition-id="{{compositionId}}" data-start="0" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}">
    <div class="mg-stage">
      <div class="mg-grid-floor"></div>
      <div class="mg-panel">
        <div class="counter-wrap">
          <div class="counter-num chrome-text" id="counter-num">0</div>
          <div class="counter-label accent-text" id="counter-label">{{label}}</div>
          <div class="counter-ring" id="counter-ring"></div>
        </div>
      </div>
      <div class="mg-vignette"></div>
      <div class="mg-grain"></div>
    </div>
    <style>
      {{sharedStyles}}
      [data-composition-id="{{compositionId}}"] { position: absolute; inset: 0; pointer-events: none; }
      [data-composition-id="{{compositionId}}"] .counter-wrap { position: relative; text-align: center; }
      [data-composition-id="{{compositionId}}"] .counter-num { font-size: 140px; line-height: 1; font-variant-numeric: tabular-nums; font-family: var(--mg-font-mono); opacity: 0; transform: scale(0.6); }
      [data-composition-id="{{compositionId}}"] .counter-label { font-size: 28px; margin-top: 12px; opacity: 0; font-family: var(--mg-font-mono); letter-spacing: 0.06em; }
      [data-composition-id="{{compositionId}}"] .counter-ring { position: absolute; top: 50%; left: 50%; width: 220px; height: 220px; margin: -110px 0 0 -110px; border: 2px solid var(--mg-accent); border-radius: 50%; opacity: 0; transform: scale(0.5); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "{{compositionId}}";
        const dur = {{duration}};
        const fromVal = parseInt("{{from}}", 10) || 0;
        const toVal = parseInt("{{to}}", 10) || 100;
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';
        const numEl = document.querySelector(root + ' #counter-num');

        tl.fromTo(root + ' .counter-ring', { opacity: 0, scale: 0.5 }, { opacity: 0.5, scale: 1, duration: 0.45, ease: 'back.out(1.5)' }, 0.15);
        tl.fromTo(root + ' .counter-num', { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.35, ease: 'power3.out' }, 0.2);
        tl.to(numEl, { innerText: toVal, snap: { innerText: 1 }, duration: 1.2, ease: 'power2.out' }, 0.35);
        tl.fromTo(root + ' .counter-label', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' }, 0.7);
        tl.to(root + ' .mg-grid-floor', { backgroundPositionY: '-=40', duration: dur - 0.5, ease: 'none' }, 0.15);
        tl.to(root + ' .counter-num', { scale: 1.05, duration: 0.5, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 1.3);
        tl.to(root + ' .counter-wrap', { opacity: 0, y: -10, duration: 0.35, ease: 'power2.in' }, dur - 0.4);
        tl.set({}, {}, dur);
        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
