<!-- Recipe: MOTION_PHILOSOPHY §3.3 kinetic-type + spark accents -->
<template id="mg-kinetic-type-template">
  <div
    data-composition-id="{{compositionId}}"
    data-start="0"
    data-width="{{width}}"
    data-height="{{height}}"
    data-duration="{{duration}}"
  >
    <div class="mg-stage">
      <div class="mg-grid-floor"></div>
      <div class="mg-panel">
        <svg class="mg-sparks-svg" viewBox="0 0 800 600" id="mg-sparks">
          <g>
            <line class="mg-spark" x1="120" y1="200" x2="170" y2="200" />
            <line class="mg-spark" x1="680" y1="220" x2="730" y2="220" />
            <line class="mg-spark" x1="400" y1="120" x2="400" y2="160" />
            <line class="mg-spark" x1="400" y1="440" x2="400" y2="480" />
          </g>
        </svg>
        <div class="mg-content kinetic-wrap" id="kinetic-wrap">
          {{kineticWordsHtml}}
        </div>
      </div>
      <div class="mg-vignette"></div>
      <div class="mg-grain"></div>
    </div>

    <style>
      {{sharedStyles}}
      [data-composition-id="{{compositionId}}"] {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      [data-composition-id="{{compositionId}}"] .mg-sparks-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 3;
      }
      [data-composition-id="{{compositionId}}"] .kinetic-wrap {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px 16px;
        max-width: 90%;
        margin: 0 auto;
      }
      [data-composition-id="{{compositionId}}"] .kinetic-word {
        font-size: 48px;
        line-height: 1.1;
        opacity: 0;
        transform: translateY(32px) scale(0.9);
        display: inline-block;
      }
      [data-composition-id="{{compositionId}}"] .kinetic-word:last-child {
        font-size: 64px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "{{compositionId}}";
        const dur = {{duration}};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        const words = document.querySelectorAll(root + ' .kinetic-word');
        words.forEach(function (el, i) {
          tl.fromTo(el,
            { opacity: 0, y: 32, scale: 0.9 },
            { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: 'back.out(2)' },
            0.2 + i * 0.12
          );
        });

        const sparks = document.querySelectorAll(root + ' .mg-spark');
        sparks.forEach(function (el, i) {
          tl.fromTo(el,
            { opacity: 0, scaleX: 0.3 },
            { opacity: 1, scaleX: 1, duration: 0.25, ease: 'power2.out' },
            0.35 + i * 0.08
          );
        });

        if (words.length > 0) {
          const hero = words[words.length - 1];
          tl.to(hero, { scale: 1.12, duration: 0.35, ease: 'power2.out' }, 0.8);
          tl.to(hero, { scale: 1.0, duration: 0.25 }, 1.2);
        }

        tl.to(root + ' .kinetic-wrap', { opacity: 0, y: -16, duration: 0.35, ease: 'power2.in' }, dur - 0.4);
        tl.set({}, {}, dur);

        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
