<!-- Recipe: MOTION_PHILOSOPHY §3.3 hero scale slam + §3.4 motion streak -->
<template id="mg-stat-slam-template">
  <div
    data-composition-id="{{compositionId}}"
    data-start="0"
    data-width="{{width}}"
    data-height="{{height}}"
    data-duration="{{duration}}"
  >
    <div class="mg-stage">
      <div class="mg-grid-floor"></div>
      <div class="mg-streak" id="mg-streak"></div>
      <div class="mg-panel">
        <div class="mg-content">
          <div class="slam-headline chrome-text" id="slam-headline">{{headline}}</div>
          <div class="slam-subtext accent-text" id="slam-subtext">{{subtext}}</div>
        </div>
      </div>
      <div class="mg-vignette"></div>
      <div class="mg-grain"></div>
    </div>

    <style>
      {{sharedStyles}}
      [data-composition-id="{{compositionId}}"] {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      [data-composition-id="{{compositionId}}"] .mg-streak {
        position: absolute;
        top: 50%;
        left: -100%;
        width: 200%;
        height: 4px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
        box-shadow: 0 0 24px rgba(255,255,255,0.6);
        opacity: 0;
        z-index: 2;
      }
      [data-composition-id="{{compositionId}}"] .slam-headline {
        font-size: 120px;
        line-height: 1;
        opacity: 0;
        transform: scale(2.5);
      }
      [data-composition-id="{{compositionId}}"] .slam-subtext {
        margin-top: 16px;
        font-size: 30px;
        opacity: 0;
        transform: translateY(20px);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "{{compositionId}}";
        const dur = {{duration}};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        tl.fromTo(root + ' .mg-streak',
          { opacity: 0, x: '-50%' },
          { opacity: 1, x: '50%', duration: 0.35, ease: 'power4.in' },
          0.05
        );
        tl.to(root + ' .mg-streak', { opacity: 0, duration: 0.2 }, 0.45);

        tl.fromTo(root + ' .slam-headline',
          { opacity: 0, scale: 2.5 },
          { opacity: 1, scale: 1, duration: 0.55, ease: 'power4.out' },
          0.12
        );
        tl.fromTo(root + ' .slam-subtext',
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.4, ease: 'power3.out' },
          0.5
        );

        tl.to(root + ' .slam-headline',
          { scale: 1.05, duration: 0.8, ease: 'sine.inOut', yoyo: true, repeat: 1 },
          1.0
        );

        tl.to(root + ' .slam-headline', { opacity: 0, scale: 0.9, duration: 0.3 }, dur - 0.45);
        tl.to(root + ' .slam-subtext', { opacity: 0, duration: 0.25 }, dur - 0.4);
        tl.set({}, {}, dur);

        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
