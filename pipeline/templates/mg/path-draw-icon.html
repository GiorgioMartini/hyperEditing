<!-- path-draw-icon: animated X path draw + label -->
<template id="mg-path-draw-icon-template">
  <div data-composition-id="{{compositionId}}" data-start="0" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}">
    <div class="mg-stage">
      <div class="mg-grid-floor"></div>
      <div class="mg-panel">
        <svg class="draw-svg" viewBox="0 0 400 400">
          <circle id="draw-circle" cx="200" cy="200" r="120" fill="none" stroke="var(--mg-accent)" stroke-width="3" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
          <line id="draw-x1" x1="140" y1="140" x2="260" y2="260" stroke="var(--mg-accent-secondary)" stroke-width="8" stroke-linecap="round" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
          <line id="draw-x2" x1="260" y1="140" x2="140" y2="260" stroke="var(--mg-accent-secondary)" stroke-width="8" stroke-linecap="round" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
        </svg>
        <div class="draw-label chrome-text" id="draw-label">{{label}}</div>
      </div>
      <div class="mg-vignette"></div>
      <div class="mg-grain"></div>
    </div>
    <style>
      {{sharedStyles}}
      [data-composition-id="{{compositionId}}"] { position: absolute; inset: 0; pointer-events: none; }
      [data-composition-id="{{compositionId}}"] .draw-svg { width: 280px; height: 280px; margin: 0 auto 16px; display: block; }
      [data-composition-id="{{compositionId}}"] .draw-label { font-size: 42px; text-align: center; opacity: 0; transform: translateY(12px); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "{{compositionId}}";
        const dur = {{duration}};
        const payoffAt = {{payoffLocalSec}};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        tl.to(root + ' #draw-circle', { strokeDashoffset: 0, duration: 0.6, ease: 'power2.inOut' }, 0.15);
        tl.to(root + ' #draw-x1', { strokeDashoffset: 0, duration: 0.3, ease: 'power3.out' }, payoffAt);
        tl.to(root + ' #draw-x2', { strokeDashoffset: 0, duration: 0.3, ease: 'power3.out' }, payoffAt + 0.1);
        tl.fromTo(root + ' .draw-label', { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.35, ease: 'back.out(1.6)' }, payoffAt + 0.25);
        tl.to(root + ' .mg-grid-floor', { backgroundPositionY: '-=30', duration: dur - 0.4, ease: 'none' }, 0.1);
        tl.to(root + ' .draw-svg', { rotate: 5, duration: 0.5, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0.8);
        tl.to(root + ' .draw-label', { opacity: 0, duration: 0.3, ease: 'power2.in' }, dur - 0.4);
        tl.to(root + ' .draw-svg', { opacity: 0, scale: 0.9, duration: 0.3 }, dur - 0.35);
        tl.set({}, {}, dur);
        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
