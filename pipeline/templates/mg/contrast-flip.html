<!-- contrast-flip: word A slams then morphs to word B -->
<template id="mg-contrast-flip-template">
  <div data-composition-id="{{compositionId}}" data-start="0" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}">
    <div class="mg-stage">
      <div class="mg-grid-floor"></div>
      <div class="mg-panel">
        <div class="flip-stage" id="flip-stage">
          <div class="word-a chrome-text" id="word-a">{{wordA}}</div>
          <div class="word-b chrome-text" id="word-b">{{wordB}}</div>
        </div>
      </div>
      <div class="mg-vignette"></div>
      <div class="mg-grain"></div>
    </div>
    <style>
      {{sharedStyles}}
      [data-composition-id="{{compositionId}}"] { position: absolute; inset: 0; pointer-events: none; }
      [data-composition-id="{{compositionId}}"] .flip-stage { position: relative; min-height: 180px; display: flex; align-items: center; justify-content: center; }
      [data-composition-id="{{compositionId}}"] .word-a { font-size: 140px; line-height: 1; opacity: 0; transform: scale(0.5); position: absolute; }
      [data-composition-id="{{compositionId}}"] .word-b { font-size: 140px; line-height: 1; opacity: 0; transform: scale(2.5) rotateX(90deg); position: absolute; color: var(--mg-accent); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "{{compositionId}}";
        const dur = {{duration}};
        const setupAt = {{setupLocalSec}};
        const payoffAt = {{payoffLocalSec}};
        const fadeOut = {{fadeOutLocalSec}};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        tl.fromTo(root + ' .word-a', { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(2.5)' }, setupAt);
        tl.to(root + ' .mg-grid-floor', { backgroundPositionY: '-=35', duration: dur - 0.4, ease: 'none' }, 0.15);
        tl.to(root + ' .word-a', { scale: 1.08, duration: 0.3, ease: 'power2.out' }, setupAt + 0.5);
        tl.to(root + ' .word-a', { opacity: 0, scale: 0.3, rotateY: 90, duration: 0.25, ease: 'power2.in' }, payoffAt);
        tl.fromTo(root + ' .word-b', { opacity: 0, scale: 2, rotateY: -90 }, { opacity: 1, scale: 1, rotateY: 0, duration: 0.35, ease: 'back.out(2)' }, payoffAt + 0.05);
        tl.to(root + ' .word-b', { scale: 1.06, duration: 0.6, ease: 'sine.inOut', yoyo: true, repeat: 1 }, payoffAt + 0.6);
        tl.to(root + ' .word-b', { opacity: 0, y: -16, duration: 0.3, ease: 'power2.in' }, fadeOut);
        tl.set({}, {}, dur);
        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
