<!-- hero-quote: large quote with attribution -->
<template id="mg-hero-quote-template">
  <div data-composition-id="{{compositionId}}" data-start="0" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}">
    <div class="mg-stage">
      <div class="mg-grid-floor"></div>
      <div class="mg-panel">
        <div class="quote-wrap">
          <div class="quote-mark" id="quote-mark">"</div>
          <div class="quote-text chrome-text" id="quote-text">{{quote}}</div>
          <div class="quote-attr accent-text" id="quote-attr">{{attribution}}</div>
          <div class="quote-underline" id="quote-underline"></div>
        </div>
      </div>
      <div class="mg-vignette"></div>
      <div class="mg-grain"></div>
    </div>
    <style>
      {{sharedStyles}}
      [data-composition-id="{{compositionId}}"] { position: absolute; inset: 0; pointer-events: none; }
      [data-composition-id="{{compositionId}}"] .quote-wrap { position: relative; max-width: 88%; margin: 0 auto; text-align: center; padding: 20px 0; }
      [data-composition-id="{{compositionId}}"] .quote-mark { font-size: 120px; line-height: 0.5; color: var(--mg-accent); opacity: 0; font-family: Georgia, serif; }
      [data-composition-id="{{compositionId}}"] .quote-text { font-size: 52px; line-height: 1.15; opacity: 0; transform: translateY(20px); margin: 16px 0; }
      [data-composition-id="{{compositionId}}"] .quote-attr { font-family: var(--mg-font-mono); font-size: 20px; opacity: 0; letter-spacing: 0.1em; text-transform: uppercase; }
      [data-composition-id="{{compositionId}}"] .quote-underline { height: 3px; background: var(--mg-accent); margin: 16px auto 0; width: 60%; transform: scaleX(0); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "{{compositionId}}";
        const dur = {{duration}};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        tl.fromTo(root + ' .quote-mark', { opacity: 0, scale: 0.5 }, { opacity: 0.6, scale: 1, duration: 0.35, ease: 'back.out(2)' }, 0.15);
        tl.fromTo(root + ' .quote-text', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }, 0.3);
        tl.to(root + ' .quote-underline', { scaleX: 1, duration: 0.4, ease: 'power3.out' }, 0.65);
        tl.fromTo(root + ' .quote-attr', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' }, 0.75);
        tl.to(root + ' .mg-grid-floor', { backgroundPositionY: '-=25', duration: dur - 0.5, ease: 'none' }, 0.2);
        tl.to(root + ' .quote-text', { scale: 1.02, duration: 0.8, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 1.0);
        tl.to(root + ' .quote-wrap', { opacity: 0, y: -12, duration: 0.35, ease: 'power2.in' }, dur - 0.4);
        tl.set({}, {}, dur);
        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
