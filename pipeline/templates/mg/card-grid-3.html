<!-- card-grid-3: three benefit cards with checkmarks and underline sweeps -->
<template id="mg-card-grid-3-template">
  <div data-composition-id="{{compositionId}}" data-start="0" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}">
    <div class="mg-stage">
      <div class="mg-grid-floor"></div>
      <div class="mg-panel">
        <div class="mg-content">
          <div class="grid-title accent-text" id="grid-title">{{headline}}</div>
          <div class="card-grid">{{cardItemsHtml}}</div>
        </div>
      </div>
      <div class="mg-vignette"></div>
      <div class="mg-grain"></div>
    </div>
    <style>
      {{sharedStyles}}
      [data-composition-id="{{compositionId}}"] { position: absolute; inset: 0; pointer-events: none; }
      [data-composition-id="{{compositionId}}"] .grid-title { font-size: 28px; font-family: var(--mg-font-mono); margin-bottom: 24px; opacity: 0; letter-spacing: 0.08em; text-transform: uppercase; }
      [data-composition-id="{{compositionId}}"] .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 95%; margin: 0 auto; }
      [data-composition-id="{{compositionId}}"] .benefit-card { background: var(--mg-surface); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px 14px; position: relative; opacity: 0; transform: translateY(24px); }
      [data-composition-id="{{compositionId}}"] .card-num { font-family: var(--mg-font-mono); font-size: 14px; color: var(--mg-accent); margin-bottom: 8px; }
      [data-composition-id="{{compositionId}}"] .card-text { font-size: 22px; font-weight: 700; line-height: 1.2; color: var(--mg-text); }
      [data-composition-id="{{compositionId}}"] .card-check { position: absolute; top: 12px; right: 12px; font-size: 18px; color: var(--mg-accent); opacity: 0; transform: scale(0); }
      [data-composition-id="{{compositionId}}"] .card-underline { position: absolute; bottom: 12px; left: 14px; right: 14px; height: 2px; background: var(--mg-accent); transform: scaleX(0); transform-origin: left; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "{{compositionId}}";
        const dur = {{duration}};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        tl.fromTo(root + ' .grid-title', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' }, 0.15);
        tl.to(root + ' .mg-grid-floor', { backgroundPositionX: '-=24', duration: dur - 0.4, ease: 'none' }, 0.2);

        [0, 1, 2].forEach(function (i) {
          const at = 0.35 + i * 0.25;
          tl.fromTo(root + ' #card-' + i, { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.4, ease: 'back.out(1.6)' }, at);
          tl.fromTo(root + ' #check-' + i, { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.25, ease: 'back.out(2)' }, at + 0.35);
          tl.to(root + ' #underline-' + i, { scaleX: 1, duration: 0.3, ease: 'power3.out' }, at + 0.5);
        });

        tl.to(root + ' .benefit-card', { y: -4, duration: 0.6, ease: 'sine.inOut', yoyo: true, repeat: 1, stagger: 0.1 }, 1.2);
        tl.to(root + ' .grid-title', { opacity: 0, duration: 0.25 }, dur - 0.45);
        tl.to(root + ' .benefit-card', { opacity: 0, y: 12, duration: 0.3, stagger: 0.06, ease: 'power2.in' }, dur - 0.4);
        tl.set({}, {}, dur);
        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
