<!-- stamp-reject: grid of chips with animated X stamp -->
<template id="mg-stamp-reject-template">
  <div data-composition-id="{{compositionId}}" data-start="0" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}">
    <div class="mg-stage">
      <div class="mg-grid-floor"></div>
      <div class="stamp-panel">
        <div class="chip-grid">{{chipsHtml}}</div>
        <svg class="stamp-x" viewBox="0 0 900 600" preserveAspectRatio="none">
          <line id="stamp-x1" x1="40" y1="40" x2="860" y2="560" stroke="var(--mg-accent-secondary)" stroke-width="28" stroke-linecap="round" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
          <line id="stamp-x2" x1="860" y1="40" x2="40" y2="560" stroke="var(--mg-accent-secondary)" stroke-width="28" stroke-linecap="round" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
        </svg>
        <div class="stamp-label" id="stamp-label">{{stampText}}</div>
      </div>
      <div class="mg-vignette"></div>
      <div class="mg-grain"></div>
    </div>
    <style>
      {{sharedStyles}}
      [data-composition-id="{{compositionId}}"] { position: absolute; inset: 0; pointer-events: none; }
      [data-composition-id="{{compositionId}}"] .stamp-panel { position: absolute; inset: 40px 40px 60px 40px; }
      [data-composition-id="{{compositionId}}"] .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
      [data-composition-id="{{compositionId}}"] .stamp-chip { background: var(--mg-surface); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px 10px; font-family: var(--mg-font-mono); font-size: 16px; text-align: center; opacity: 0; transform: scale(0.9); color: var(--mg-text-dim); }
      [data-composition-id="{{compositionId}}"] .stamp-x { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; }
      [data-composition-id="{{compositionId}}"] .stamp-label { position: absolute; bottom: 0; left: 0; right: 0; text-align: center; font-size: 36px; font-weight: 900; letter-spacing: 0.06em; color: var(--mg-accent-secondary); opacity: 0; transform: scale(1.4); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "{{compositionId}}";
        const dur = {{duration}};
        const payoffAt = {{payoffLocalSec}};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        const chips = document.querySelectorAll(root + ' .stamp-chip');
        chips.forEach(function (el, i) {
          tl.fromTo(el, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.25, ease: 'power2.out' }, 0.15 + i * 0.06);
        });

        tl.to(root + ' .mg-grid-floor', { backgroundPositionY: '-=30', duration: dur - 0.5, ease: 'none' }, 0.1);
        tl.to(root + ' #stamp-x1', { strokeDashoffset: 0, duration: 0.35, ease: 'power3.out' }, payoffAt);
        tl.to(root + ' #stamp-x2', { strokeDashoffset: 0, duration: 0.35, ease: 'power3.out' }, payoffAt + 0.08);
        tl.fromTo(root + ' .stamp-label', { opacity: 0, scale: 1.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(2)' }, payoffAt + 0.2);
        tl.to(root + ' .stamp-chip', { opacity: 0.35, duration: 0.3, ease: 'power2.in' }, payoffAt + 0.15);
        tl.to(root + ' .stamp-label', { scale: 1.03, duration: 0.5, ease: 'sine.inOut', yoyo: true, repeat: 1 }, payoffAt + 0.7);
        tl.to(root + ' .stamp-x', { opacity: 0, duration: 0.25 }, dur - 0.4);
        tl.to(root + ' .stamp-label', { opacity: 0, duration: 0.25 }, dur - 0.35);
        tl.set({}, {}, dur);
        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
