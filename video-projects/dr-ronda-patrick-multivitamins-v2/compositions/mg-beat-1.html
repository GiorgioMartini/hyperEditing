    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "mg-beat-1";
        const dur = 3.129;
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        const words = document.querySelectorAll(root + ' .kinetic-word');
        words.forEach(function (el, i) {
          tl.fromTo(el,
            { opacity: 0, y: 32, scale: 0.9 },
            { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: 'back.out(2)' },
            0.2 + i * 0.12
          );
        });

        if (words.length > 0) {
          const hero = words[words.length - 1];
          tl.to(hero, { scale: 1.12, duration: 0.35, ease: 'power2.out' }, 0.8);
          tl.to(hero, { scale: 1.0, duration: 0.25 }, 1.2);
        }

        tl.to(root + ' .kinetic-wrap', { opacity: 0, y: -16, duration: 0.35, ease: 'power2.in' }, dur - 0.4);
        tl.set({}, {}, dur);

        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
