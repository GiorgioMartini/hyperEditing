<template id="mg-stat-callout-template">
  <div
    data-composition-id="mg-beat-1"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="3.5"
  >
    <style>
      [data-composition-id="mg-beat-1"] {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 280px;
        pointer-events: none;
      }
      [data-composition-id="mg-beat-1"] .mg-scrim {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        opacity: 0;
      }
      [data-composition-id="mg-beat-1"] .stat-headline {
        font-family: sans-serif;
        font-weight: 800;
        font-size: 120px;
        line-height: 1;
        color: #ffffff;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transform: scale(0.85);
      }
      [data-composition-id="mg-beat-1"] .stat-subtext {
        margin-top: 16px;
        font-family: sans-serif;
        font-weight: 600;
        font-size: 36px;
        color: #ff3333;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        opacity: 0;
        transform: translateY(12px);
      }
    </style>

    <div class="mg-scrim"></div>
    <div class="stat-headline" id="stat-headline">5 years</div>
    <div class="stat-subtext" id="stat-subtext">slower brain aging</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "mg-beat-1";
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        tl.fromTo(root + ' .mg-scrim',
          { opacity: 0 },
          { opacity: 1, duration: 0.25, ease: 'power2.out' },
          0
        );
        tl.fromTo(root + ' .stat-headline',
          { opacity: 0, scale: 0.85 },
          { opacity: 1, scale: 1, duration: 0.45, ease: 'back.out(2)' },
          0.1
        );
        tl.fromTo(root + ' .stat-subtext',
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' },
          0.35
        );
        tl.to(root + ' .mg-scrim', { opacity: 0, duration: 0.25 }, 3.5 - 0.3);
        tl.to(root + ' .stat-headline', { opacity: 0, scale: 0.95, duration: 0.25 }, 3.5 - 0.4);
        tl.to(root + ' .stat-subtext', { opacity: 0, duration: 0.25 }, 3.5 - 0.35);
        tl.set({}, {}, 3.5);

        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
