<template id="mg-list-reveal-template">
  <div
    data-composition-id="mg-beat-4"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="4.5"
  >
    <style>
      [data-composition-id="mg-beat-4"] {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 260px 64px 0;
        pointer-events: none;
      }
      [data-composition-id="mg-beat-4"] .mg-scrim {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        opacity: 0;
      }
      [data-composition-id="mg-beat-4"] .list-title {
        font-family: sans-serif;
        font-weight: 700;
        font-size: 40px;
        color: #ff3333;
        margin-bottom: 24px;
        opacity: 0;
      }
      [data-composition-id="mg-beat-4"] .list-item {
        font-family: sans-serif;
        font-weight: 800;
        font-size: 48px;
        color: #ffffff;
        text-align: center;
        margin: 8px 0;
        opacity: 0;
        transform: translateX(-24px);
      }
    </style>

    <div class="mg-scrim"></div>
    <div class="list-title" id="list-title">Key Nutrients</div>
    <div class="list-item" id="list-item-0">Vitamin D3</div>
    <div class="list-item" id="list-item-1">Magnesium</div>
    <div class="list-item" id="list-item-2">Cellular Repair</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const compId = "mg-beat-4";
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        tl.fromTo(root + ' .mg-scrim',
          { opacity: 0 },
          { opacity: 1, duration: 0.25, ease: 'power2.out' },
          0
        );
        tl.fromTo(root + ' .list-title',
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' },
          0.1
        );

        const items = document.querySelectorAll(root + ' .list-item');
        items.forEach(function (el, i) {
          tl.fromTo(el,
            { opacity: 0, x: -24 },
            { opacity: 1, x: 0, duration: 0.35, ease: 'power2.out' },
            0.35 + i * 0.2
          );
        });

        tl.to(root + ' .mg-scrim', { opacity: 0, duration: 0.2 }, 4.5 - 0.25);
        tl.to(root + ' .list-title', { opacity: 0, duration: 0.2 }, 4.5 - 0.35);
        tl.to(root + ' .list-item', { opacity: 0, duration: 0.2 }, 4.5 - 0.3);
        tl.set({}, {}, 4.5);

        window.__timelines = window.__timelines || {};
        window.__timelines[compId] = tl;
      })();
    </script>
  </div>
</template>
