      (function () {

        const dur = 1.959000000000001;
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="' + compId + '"]';

        tl.fromTo(root + ' .stat-headline',
          { opacity: 0, scale: 0.7 },

          { opacity: 0, scale: 0.92, duration: 0.3, ease: 'power2.in' },
          dur - 0.45
        );

          { opacity: 0, duration: 0.25 },
